profile_name: "KFW_2026_OfECC_Geophysical"
base: "base_geoview.yaml"
client: "KFW"
project: "KFW Offshore Floating Wind Farm Geophysical Survey - Export Cable Route"
generated_from: "KRKFW-KFW-GEO-GPH-SOW-00002 + Geophysical Surveys Tech_Specs_v.1_0609.pdf"
generated_date: "2026-02-10"
notes: "SoW Section 7.2 + Tech Specs 기반 생성. REVIEW 항목 7개 - 사용 전 확인 필요"

variables:
  project_code: null    # CLI에서 --var project_code=KRKFW 로 주입
  area_code: null        # CLI에서 --var area_code=ECR 로 주입

line_list:  # REVIEW: 라인 리스트 컬럼명 SoW/Tech Specs 미명시
  source: "line_list.csv"
  line_id_column: "LineID"      # REVIEW: 컬럼명 미명시, 일반적 이름 사용
  status_column: "Status"       # REVIEW: 컬럼명 미명시, 일반적 이름 사용
  status_filter: "Completed"

# REVIEW: 폴더 구조 SoW/Tech Specs 미명시, 센서 기반 일반 패턴 적용
folders:

  # -------------------------------------------------------
  # 01_MBES - Multibeam Echosounder (IHO Order 1a)
  # -------------------------------------------------------
  - path: "01_MBES/Raw"
    description: "MBES raw data (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.*"  # REVIEW: Raw 확장자 장비별 상이 (*.all, *.kmall 등)

  - path: "01_MBES/Processed"
    description: "MBES processed XYZ (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.xyz"

  - path: "01_MBES/Grids/DTM"
    description: "MBES DTM GeoTIFF 2m/4m (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"  # REVIEW: Grid 파일명 패턴 미명시

  - path: "01_MBES/Grids/TVU"
    description: "MBES Total Vertical Uncertainty grid"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "01_MBES/Grids/THU"
    description: "MBES Total Horizontal Uncertainty grid"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "01_MBES/Grids/SD"
    description: "MBES Standard Deviation grid"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "01_MBES/Grids/Density"
    description: "MBES Sounding Density grid"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "01_MBES/Grids/Contours"
    description: "MBES depth contours shapefile (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.shp"

  - path: "01_MBES/Backscatter"
    description: "MBES backscatter mosaic (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "01_MBES/Metadata"
    description: "MBES MEDIN XML metadata (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.xml"

  # -------------------------------------------------------
  # 02_SSS - Side Scan Sonar (Dual Freq HF/LF)
  # -------------------------------------------------------
  - path: "02_SSS/Raw"
    description: "SSS raw XTF both channels (SoW 7.2, Tech Specs 10.6)"
    rules:
      - type: file_pattern
        pattern: "*.xtf"
        naming_regex: "^(?P<line>.+?)\\.xtf$"  # REVIEW: 파일 네이밍 규칙 미명시
      - type: count_match
        match_to: line_list

  - path: "02_SSS/Mosaics/HF"
    description: "SSS HF mosaic GeoTIFF 1x1km tiles (SoW 7.2, Tech Specs 16.1.10)"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "02_SSS/Mosaics/LF"
    description: "SSS LF mosaic GeoTIFF 1x1km tiles (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"

  - path: "02_SSS/Contacts"
    description: "SSS contact list SHP + CSV (Tech Specs 10.6)"
    rules:
      - type: file_pattern
        pattern: "*.shp"
      - type: file_pattern
        pattern: "*.csv"

  - path: "02_SSS/Project"
    description: "SonarWiz project (SoW 7.2)"
    optional: true
    rules:
      - type: file_pattern
        pattern: "*.*"  # REVIEW: SonarWiz 프로젝트 파일 패턴 미명시

  - path: "02_SSS/Metadata"
    description: "SSS MEDIN XML metadata (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.xml"

  # -------------------------------------------------------
  # 03_SBP - Sub-Bottom Profiler HF (Parametric/Chirp)
  # -------------------------------------------------------
  - path: "03_SBP/Raw"
    description: "SBP raw full waveform 24-bit SEG-Y (Tech Specs 12)"
    rules:
      - type: file_pattern
        pattern: "*.sgy"  # REVIEW: Raw 확장자 장비별 상이 가능
        naming_regex: "^(?P<line>.+?)\\.sgy$"  # REVIEW: 파일 네이밍 규칙 미명시
      - type: count_match
        match_to: line_list
      - type: segy_header_check
        check_coordinates: true
        check_sample_rate: true  # REVIEW: SEG-Y 샘플레이트 값 SoW/Tech Specs 미명시

  - path: "03_SBP/Processed"
    description: "SBP processed SEG-Y motion/datum corrected (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.sgy"
        naming_regex: "^(?P<line>.+?)\\.sgy$"  # REVIEW: 파일 네이밍 규칙 미명시
      - type: count_match
        match_to: line_list
      - type: segy_header_check
        check_coordinates: true
        check_sample_rate: true  # REVIEW: SEG-Y 샘플레이트 값 미명시

  - path: "03_SBP/Images"
    description: "SBP profile images TIFF/PNG (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"
      - type: file_pattern
        pattern: "*.png"

  - path: "03_SBP/Interpretation"
    description: "SBP interpretation CSV - horizons, TWT, Elevation, Depth BSB (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.csv"

  - path: "03_SBP/Grids"
    description: "SBP elevation/BSB/isochore grids GeoTIFF + XYZ 5m (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"  # REVIEW: Grid 파일명 패턴 미명시
      - type: file_pattern
        pattern: "*.xyz"

  - path: "03_SBP/Metadata"
    description: "SBP MEDIN XML metadata (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.xml"

  # -------------------------------------------------------
  # 04_UHRS - Multi-Frequency SBP (Sparker/Boomer)
  # -------------------------------------------------------
  - path: "04_UHRS/Raw"
    description: "UHRS raw SEG-Y (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.sgy"  # REVIEW: Raw 확장자 장비별 상이 가능
        naming_regex: "^(?P<line>.+?)\\.sgy$"  # REVIEW: 파일 네이밍 규칙 미명시
      - type: count_match
        match_to: line_list
      - type: segy_header_check
        check_coordinates: true
        check_sample_rate: true  # REVIEW: SEG-Y 샘플레이트 값 미명시

  - path: "04_UHRS/Processed"
    description: "UHRS processed SEG-Y motion/datum corrected (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.sgy"
        naming_regex: "^(?P<line>.+?)\\.sgy$"  # REVIEW: 파일 네이밍 규칙 미명시
      - type: count_match
        match_to: line_list
      - type: segy_header_check
        check_coordinates: true
        check_sample_rate: true  # REVIEW: SEG-Y 샘플레이트 값 미명시

  - path: "04_UHRS/Images"
    description: "UHRS profile images TIFF/PNG (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"
      - type: file_pattern
        pattern: "*.png"

  - path: "04_UHRS/Interpretation"
    description: "UHRS interpretation CSV (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.csv"

  - path: "04_UHRS/Grids"
    description: "UHRS elevation/BSB/isochore grids GeoTIFF + XYZ 5m (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.tif"  # REVIEW: Grid 파일명 패턴 미명시
      - type: file_pattern
        pattern: "*.xyz"

  - path: "04_UHRS/Metadata"
    description: "UHRS MEDIN XML metadata (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.xml"

  # -------------------------------------------------------
  # 05_MAG - Magnetometer (Cesium Vapor)
  # -------------------------------------------------------
  - path: "05_MAG/Raw"
    description: "MAG raw CSV/ASCII (SoW 7.2, Tech Specs 11.6)"
    rules:
      - type: file_pattern
        pattern: "*.csv"
      - type: file_pattern
        pattern: "*.ascii"

  - path: "05_MAG/Processed"
    description: "MAG processed CSV (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.csv"

  - path: "05_MAG/Grids"
    description: "MAG altitude/signal/residual grids 0.5m bin (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.grd"
      - type: file_pattern
        pattern: "*.tif"

  - path: "05_MAG/Contacts"
    description: "MAG contact list SHP + CSV (Tech Specs 11.6)"
    rules:
      - type: file_pattern
        pattern: "*.shp"
      - type: file_pattern
        pattern: "*.csv"

  - path: "05_MAG/Project"
    description: "Oasis Montaj project (SoW 7.2)"
    optional: true
    rules:
      - type: file_pattern
        pattern: "*.gdb"  # REVIEW: Oasis Montaj 프로젝트 파일 패턴 미명시

  - path: "05_MAG/Metadata"
    description: "MAG MEDIN XML metadata (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.xml"

  # -------------------------------------------------------
  # 06_Kingdom - Kingdom Project (SBP + UHRS)
  # -------------------------------------------------------
  - path: "06_Kingdom"
    description: "Kingdom project TWT + DEPTH domains (SoW 7.2)"
    optional: true
    rules:
      - type: file_pattern
        pattern: "*.*"  # REVIEW: Kingdom 프로젝트 파일 패턴 미명시

  # -------------------------------------------------------
  # 07_SVP - Sound Velocity Profiles
  # -------------------------------------------------------
  - path: "07_SVP"
    description: "SVP data (SoW 7.2 CSV, Tech Specs 8.5 XLS)"
    rules:
      - type: file_pattern
        pattern: "*.csv"
      - type: file_pattern
        pattern: "*.xls"

  # -------------------------------------------------------
  # 08_Navigation - Positioning Data
  # -------------------------------------------------------
  - path: "08_Navigation"
    description: "Positioning data CSV/TXT/SHP (Tech Specs 7.4)"
    rules:
      - type: file_pattern
        pattern: "*.csv"
      - type: file_pattern
        pattern: "*.shp"

  # -------------------------------------------------------
  # 09_Targets - Combined Target Lists
  # -------------------------------------------------------
  - path: "09_Targets"
    description: "MBES/SSS/MAG/SBP target picks SHP + XLSX (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.shp"
      - type: file_pattern
        pattern: "*.xlsx"

  # -------------------------------------------------------
  # 10_GIS - SSDM V2 Geodatabase
  # -------------------------------------------------------
  - path: "10_GIS"
    description: "SSDM V2 Esri ArcGIS geodatabase (SoW 7.2)"
    rules:
      - type: file_pattern
        pattern: "*.gdb"
      - type: file_pattern
        pattern: "*.shp"

  # -------------------------------------------------------
  # 11_Reports - Reports and Drawings
  # -------------------------------------------------------
  - path: "11_Reports"
    description: "Survey reports PDF + Word, drawings MXD + DWG (Tech Specs 16.1.6-7)"
    rules:
      - type: file_pattern
        pattern: "*.pdf"
      - type: file_pattern
        pattern: "*.docx"
      - type: file_pattern
        pattern: "*.mxd"
      - type: file_pattern
        pattern: "*.dwg"
